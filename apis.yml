aid: agile-sdlc
name: Agile SDLC
description: A collection of resources, tools, and APIs covering the Agile Software Development Life Cycle (SDLC) — an iterative and incremental approach to software development that integrates agile 
  principles across every phase from requirements through deployment. Agile SDLC replaces the rigid waterfall model with continuous planning, development, testing, and delivery through short sprint 
  cycles. This topic covers the APIs and platforms that support each phase of the agile SDLC including requirements management, code review, CI/CD, testing, and deployment.
